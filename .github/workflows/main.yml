name: LLM Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio
          
      - name: Run unit tests with Mocking
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest -v tests/test_main.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: actions/setup-docker-action@v1 # This is a placeholder, usually use setup-buildx-action
        
      - name: Build Docker image
        run: |
          docker build -t llm-pipeline:latest .
